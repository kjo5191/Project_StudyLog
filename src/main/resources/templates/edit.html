<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>질문 수정</title>
</head>
<body>
	<h1>질문 수정</h1>

	<form th:action="@{'/question/edit/' + ${question.id}}" method="post">
		<p>
			<label>카테고리:</label><br/>
			<!-- 🔥 카테고리를 select 박스로 수정 -->
			<select name="category">
				<option value="Java" th:selected="${question.category == 'Java'}">Java</option>
				<option value="DB" th:selected="${question.category == 'DB'}">DB</option>
				<option value="Spring" th:selected="${question.category == 'Spring'}">Spring</option>
				<option value="Network" th:selected="${question.category == 'Network'}">Network</option>
			</select>
		</p>
		<p>
			<label>질문:</label><br/>
			<textarea name="content" rows="4" cols="50" th:text="${question.content}"></textarea>
		</p>
		<p>
			<label>모범답안:</label><br/>
			<textarea name="modelAnswer" rows="6" cols="50" th:text="${question.modelAnswer}"></textarea>
		</p>
		<p>
			<button type="submit">수정 완료</button>
		</p>
	</form>
</body>
</html>
