<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Vue.js 첫 시작</title>
	<!-- Vue를 CDN으로 불러오기 -->
	<script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.js"></script>
</head>
<body>

	<div id="app">
		<h1>{{ message }}</h1>
		<button @click="changeMessage">메시지 변경</button>
	</div>

	<script>
		const { createApp } = Vue;

		createApp({
			data() {
				return {
					message: "Hello Vue.js!"
				};
			},
			methods: {
				changeMessage() {
					this.message = "변경된 메시지!";
				}
			}
		}).mount('#app');
	</script>

</body>
</html>
