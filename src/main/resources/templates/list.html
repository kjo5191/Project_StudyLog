<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>질문 목록</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
	<div class="card shadow-sm">
		<div class="card-header">
			<h3 class="mb-0">질문 목록</h3>
		</div>
		<div class="card-body">
			<table class="table table-hover table-bordered align-middle text-center">
				<thead class="table-light">
					<tr>
						<th>ID</th>
						<th>카테고리</th>
						<th>질문</th>
<!--						<th>모범답안</th>-->
						<th>관리</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="q : ${questions}">
						<td th:text="${q.id}">1</td>
						<!-- <td>
							<span th:each="c : ${q.categories}" th:text="${c.name}" class="badge bg-secondary me-1">카테고리</span>
						</td> -->
						<td th:text="${q.category}">카테고리</td>
						<td th:text="${q.content}">질문 내용</td>
<!--						<td th:text="${q.modelAnswer}">모범답안</td>-->
						<td>
							<a th:href="@{'/question/edit/' + ${q.id}}" class="btn btn-sm btn-primary me-1">수정</a>
							<form th:action="@{'/question/delete/' + ${q.id}}" method="post" style="display:inline;">
								<button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('삭제할까요?')">삭제</button>
							</form>
						</td>
					</tr>
				</tbody>
			</table>

			<div class="mt-3">
				<a th:href="@{/question/new}" class="btn btn-success">질문 추가</a>
				<a th:href="@{/question/random}" class="btn btn-outline-secondary">랜덤 질문 보기</a>
			</div>
		</div>
	</div>
</div>

</body>
</html>
