<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>질문 목록</title>
</head>
<body>
	<h1>질문 목록</h1>

	<!-- 🔥 카테고리 필터 폼 추가 -->
	<form method="get" th:action="@{/question/list}">
		<select name="category">
			<option value="">전체</option>
			<option value="Java">Java</option>
			<option value="DB">DB</option>
			<option value="Spring">Spring</option>
			<option value="Network">Network</option>
		</select>
		<button type="submit">필터</button>
	</form>

	<br/>

	<table border="1">
		<thead>
			<tr>
				<th>ID</th>
				<th>카테고리</th>
				<th>질문</th>
<!--				<th>모범답안</th>-->
				<th>관리</th> <!-- 🔥 관리(수정/삭제) 칸 추가 -->
			</tr>
		</thead>
		<tbody>
			<tr th:each="q : ${questions}">
				<td th:text="${q.id}">1</td>
				<td th:text="${q.category}">카테고리</td>
				<td th:text="${q.content}">질문 내용</td>
<!--				<td th:text="${q.modelAnswer}">모범답안</td>-->
				<td>
					<a th:href="@{'/question/edit/' + ${q.id}}">수정</a>
					<form th:action="@{'/question/delete/' + ${q.id}}" method="post" style="display:inline;">
						<button type="submit" onclick="return confirm('삭제할까요?')">삭제</button>
					</form>
				</td>
			</tr>
		</tbody>
	</table>

	<br/>
	<a th:href="@{/question/random}">랜덤 질문 보기</a>

</body>
</html>
