<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>질문 추가</title>
</head>
<body>
	<h1>질문 추가</h1>

	<form th:action="@{/question/new}" method="post">
		
		<p>카테고리:</p>
		<p>
			<label>카테고리:</label><br/>
			<!-- 🔥 카테고리를 select 박스로 수정 -->
			<input type="checkbox" name="category" value="Java">Java<br/>
			<input type="checkbox" name="category" value="DB">DB<br/>
			<input type="checkbox" name="category" value="Spring">HTTP<br/>
			<input type="checkbox" name="category" value="백엔드 개념">백엔드 개념<br/>
			<input type="checkbox" name="category" value="객체지향 설계">객체지향 설계<br/>
			<input type="checkbox" name="category" value="보안">보안<br/>
			<input type="checkbox" name="category" value="컴퓨터 기초">컴퓨터 기초<br/>
			<input type="checkbox" name="category" value="JavaScript">JavaScript<br/>
			<input type="checkbox" name="category" value="Spring MVC">Spring MVC<br/>
			<input type="checkbox" name="category" value="운영체제">운영체제<br/>
		</p>
		
		<p>
			<label>질문 내용:</label><br/>
			<textarea name="content" rows="4" cols="50" required></textarea>
		</p>
		<p>
			<label>모범 답안:</label><br/>
			<textarea name="modelAnswer" rows="6" cols="50"></textarea>
		</p>
		<p>
			<button type="submit">저장</button>
		</p>
	</form>
</body>
</html>
